auto_update:
  url: 
  interval: -1

allow_external_connections: false
vif_only: false
block_quic: true
geoip_db_url: https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country-without-asn.mmdb
asn_db_url: https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country-asn.mmdb
proxy_latency_test_url: http://cp.cloudflare.com/generate_204
direct_latency_test_url: http://cp.cloudflare.com/generate_204
bypass_tunnel_proxy:
- 192.168.0.0/16

dns:
  bootstrap:
  - 223.5.5.5
  - 119.29.29.29
  - 1.1.1.1
  upstreams:
    Upstreams:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  forward:
    - domain_wildcard:
        match: "*"
        value: Upstreams
  proxy_nameservers:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query

